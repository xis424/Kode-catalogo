<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>KODE — Catálogo</title>
  <meta property="og:title" content="KODE — Catálogo" />
<meta property="og:description" content="Tu estilo. Tu código." />
<meta property="og:image" content="https://kodelr.netlify.app/imgs/Preview.jpg" />
<meta property="og:url" content="https://kodelr.netlify.app" />
<meta property="og:type" content="website" />
  <link rel="stylesheet" href="style.css" />
  <!-- Google Fonts: Bebas Neue (display) + DM Sans (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ══════════════════════════════════════════
       PANTALLA 1: HOME
  ══════════════════════════════════════════ -->
  <div id="screen-home" class="screen active">

    <!-- Header -->
    <header class="home-header">
      <div class="home-logo">KODE</div>
      <p class="home-tagline">Tu estilo. Tu codigo.</p>
    </header>

    <!-- Banner hero -->
    <div class="home-hero">
      <img
        src="./imgs/banner.jpg"
        alt="KODE Banner"
        class="hero-img"
      />
      <div class="hero-overlay">
        <span class="hero-badge">NUEVA TEMPORADA</span>
        <h2 class="hero-text">Colección<br/>2026</h2>
      </div>
    </div>

    <!-- Título sección -->
    <div class="section-label">
      <span>CATEGORÍAS</span>
    </div>

    <!-- Grid de categorías -->
    <div class="categories-grid" id="categories-grid">
      <!-- Generado por JS -->
    </div>

    <!-- Footer minimal -->
    <footer class="home-footer">
      <span>© 2026 KODE — Todos los derechos reservados</span>
    </footer>

  </div>


  <!-- ══════════════════════════════════════════
       PANTALLA 2: PRODUCTOS POR CATEGORÍA
  ══════════════════════════════════════════ -->
  <div id="screen-category" class="screen">

    <!-- Navbar con back -->
    <nav class="top-nav">
      <button class="btn-back" onclick="goBack()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
      </button>
      <span class="nav-title" id="category-title">Categoría</span>
      <div class="nav-spacer"></div>
    </nav>

    <!-- Contador de productos -->
    <div class="products-meta">
      <span id="products-count">0 productos</span>
    </div>

    <!-- Grilla de productos -->
    <div class="products-grid" id="products-grid">
      <!-- Generado por JS -->
    </div>

  </div>


  <!-- ══════════════════════════════════════════
       PANTALLA 3: DETALLE DEL PRODUCTO
  ══════════════════════════════════════════ -->
  <div id="screen-detail" class="screen">

    <!-- Navbar -->
    <nav class="top-nav transparent">
      <button class="btn-back" onclick="goBack()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
      </button>
      <span class="nav-title" id="detail-category">Categoría</span>
      <div class="nav-spacer"></div>
    </nav>

    <!-- Imagen principal -->
    <div class="detail-image-wrap">
      <img id="detail-img" src="" alt="" class="detail-img" />
      <div class="detail-img-overlay"></div>
    </div>

    <!-- Info del producto -->
    <div class="detail-body">

      <div class="detail-header">
        <h1 class="detail-name" id="detail-name">Nombre</h1>
        <div class="detail-price" id="detail-price">$0</div>
      </div>

      <!-- Selector de talle -->
      <div class="selector-block" id="size-block">
        <div class="selector-label">TALLE</div>
        <div class="selector-options" id="size-options">
          <!-- Generado por JS -->
        </div>
      </div>

      <!-- Selector de color -->
      <div class="selector-block" id="color-block">
        <div class="selector-label">COLOR</div>
        <div class="selector-options" id="color-options">
          <!-- Generado por JS -->
        </div>
      </div>

      <!-- Descripción -->
      <p class="detail-desc" id="detail-desc"></p>

    </div>

    <!-- Botón fijo WhatsApp -->
    <div class="wsp-bar">
      <button class="btn-wsp" id="btn-wsp" onclick="openWhatsApp()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
        </svg>
        Consultar por WhatsApp
      </button>
    </div>

  </div>


  <script src="script.js"></script>
</body>
</html>
